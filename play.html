<script>
// ============================================================
// SECTION 1: CANVAS SETUP & RESPONSIVE SCALING
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  const isWide = window.innerWidth >= 760;
  let availW, availH;
  if (isWide) {
    availW = window.innerWidth - 300 - 32;
    availH = window.innerHeight - 16;
  } else {
    availW = window.innerWidth - 16;
    availH = window.innerHeight - 100 - 32;
  }
  const scale = Math.min(availW / W, availH / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ============================================================
// SECTION 2: CONSTANTS
// ============================================================
const GRAVITY          = 0.45;
const FLAP_IMPULSE     = -7.5;
const BASE_SCROLL_SPEED = 2.5;
const SPEED_RAMP       = 0.04;
const MAX_SCROLL_SPEED = 5.0;
const TERMINAL_VELOCITY = 10;

const MOLE_X     = 100;
const MOLE_SIZE  = 3;
const HITBOX_INSET = 3;

const OBSTACLE_WIDTH   = 52;
const OBSTACLE_SPACING = 220;
const INITIAL_GAP = 150;
const GAP_SHRINK  = 1.5;
const MIN_GAP     = 100;
const GAP_TOP_MIN    = 60;
const GAP_BOTTOM_MIN = 60;

const GROUND_HEIGHT = 50;
const GROUND_Y = H - GROUND_HEIGHT;

const DYING_FRAMES = 45;

const STATE = { START: 0, PLAYING: 1, DYING: 2, GAME_OVER: 3, NAME_ENTRY: 4 };

// ============================================================
// SECTION 3: COLOR PALETTE SYSTEM
// ============================================================
const SPRING = {
  bg1:          [135, 206, 235],
  bg2:          [180, 230, 180],
  ground:       [ 80, 160,  60],
  groundDetail: [110, 190,  80],
  obstacle:     [238, 233, 218],  // off-white painted fence
  obstacleDark: [175, 168, 152],  // fence shadow / rail
  obstacleLight:[255, 252, 245],  // fence highlight
  obstacleLED:  [255, 200,  60],  // flower yellow
  particle:     [255, 200, 210],
  text:         [ 80,  50,  20],
  textGlow:     [160,  90,  30],
  tunnelLine:   [255, 255, 255],  // cloud white
  bgDetail:     [255, 160, 190],  // pink blossom petals
};

const SUMMER = {
  bg1:          [ 30, 120, 200],
  bg2:          [ 60, 180, 100],
  ground:       [ 40, 130,  40],
  groundDetail: [200, 210,  60],
  obstacle:     [228, 222, 200],  // slightly warmer white
  obstacleDark: [160, 152, 132],
  obstacleLight:[248, 244, 228],
  obstacleLED:  [255, 120,  40],  // orange poppy
  particle:     [255, 240,  80],
  text:         [255, 230, 160],
  textGlow:     [240, 180,  40],
  tunnelLine:   [255, 255, 255],
  bgDetail:     [255, 220,  60],  // golden sunflower petals
};

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function rgb(c)    { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rgba(c,a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

function getPalette(score) {
  const t = Math.min(score / 30, 1.0);
  const p = {};
  for (const key in SPRING) {
    p[key] = lerpColor(SPRING[key], SUMMER[key], t);
  }
  return p;
}

// ============================================================
// SECTION 4: BUNNY PIXEL SPRITE
// ============================================================
const BUNNY_SPRITE = [
  '00000WW000WW00000',
  '0000WWPW0WWPW0000',
  '0000WPPW0WPPW0000',
  '000WWPPWWWPPWW000',
  '00WWWWWWWWWWWWD00',
  '0WWWWETWWWTEWWWD0',
  '0WWWWWKRWWWWWWWD0',
  '0WWWWWKWWWWWWWWD0',
  '00DKKKKKWWWWWDD00',
  '00DWWKKKWWWWWWD00',
  '000DWWWWWWWWDD000',
  '000F0DWWWWD0F0000',
  '000FF0DDDD0FF0000',
  '0000F000000F00000',
];

const BUNNY_COLORS = {
  'W': [240, 235, 225],
  'K': [255, 250, 245],
  'P': [255, 160, 180],
  'R': [240,  90, 120],
  'E': [ 40,  30,  60],
  'T': [255, 195, 205],
  'F': [200, 195, 188],
  'D': [175, 168, 158],
};

const BUNNY_W = BUNNY_SPRITE[0].length;
const BUNNY_H = BUNNY_SPRITE.length;

function drawBunny(x, y, rotation, squash) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.scale(squash, 2 - squash);

  const ox = -(BUNNY_W * MOLE_SIZE) / 2;
  const oy = -(BUNNY_H * MOLE_SIZE) / 2;

  for (let row = 0; row < BUNNY_H; row++) {
    for (let col = 0; col < BUNNY_W; col++) {
      const ch = BUNNY_SPRITE[row][col];
      if (ch === '0') continue;
      const c = BUNNY_COLORS[ch];
      if (!c) continue;
      ctx.fillStyle = rgb(c);
      ctx.fillRect(ox + col * MOLE_SIZE, oy + row * MOLE_SIZE, MOLE_SIZE, MOLE_SIZE);
    }
  }
  ctx.restore();
}

// ============================================================
// SECTION 5: PARTICLE SYSTEM
// ============================================================
const MAX_PARTICLES = 80;
const particles = [];
for (let i = 0; i < MAX_PARTICLES; i++) {
  particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: [0,0,0], size: 2 });
}

function spawnParticle(x, y, vx, vy, color, life, size) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (!particles[i].active) {
      const p = particles[i];
      p.active = true;
      p.x = x; p.y = y;
      p.vx = vx; p.vy = vy;
      p.color = color;
      p.life = life;
      p.maxLife = life;
      p.size = size || 2;
      return;
    }
  }
}

function spawnFlapParticles(x, y, palette) {
  for (let i = 0; i < 6; i++) {
    const vx = (Math.random() - 0.5) * 3;
    const vy = Math.random() * 3 + 1;
    const c = palette.particle;
    spawnParticle(
      x + Math.random() * 10 - 5, y + 10,
      vx, vy,
      [c[0] + Math.random() * 40 - 20,
       c[1] + Math.random() * 40 - 20,
       c[2] + Math.random() * 40 - 20],
      20 + Math.random() * 15, 2 + Math.random() * 2
    );
  }
}

function spawnDeathParticles(x, y, palette) {
  for (let i = 0; i < 18; i++) {
    const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    const c = i % 2 === 0 ? [255, 200, 220] : palette.particle;
    spawnParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed,
                  c, 30 + Math.random() * 20, 2 + Math.random() * 3);
  }
}

const FIREWORK_COLORS = [
  [255, 120, 170], // hot pink
  [100, 200, 255], // sky blue
  [255, 230,  60], // egg yellow
  [200, 140, 255], // lavender
  [120, 230, 130], // spring green
  [255, 175,  80], // warm orange
];

function spawnFirework(x, y) {
  const count = 28;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.2;
    const speed = 3.5 + Math.random() * 4.5;
    const c = FIREWORK_COLORS[i % FIREWORK_COLORS.length];
    spawnParticle(
      x + (Math.random() - 0.5) * 8,
      y + (Math.random() - 0.5) * 8,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 1.5,
      [c[0] + Math.random() * 30 - 15,
       c[1] + Math.random() * 30 - 15,
       c[2] + Math.random() * 30 - 15],
      40 + Math.random() * 25,
      2 + Math.random() * 3
    );
  }
}

function updateParticles() {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = particles[i];
    if (!p.active) continue;
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    if (--p.life <= 0) p.active = false;
  }
}

function drawParticles() {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = particles[i];
    if (!p.active) continue;
    ctx.fillStyle = rgba(p.color, p.life / p.maxLife);
    ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.round(p.size), Math.round(p.size));
  }
}

// ============================================================
// SECTION 5b: LEADERBOARD (Supabase + localStorage cache)
// ============================================================
const SB_URL = 'https://lhciizninqhcisffoybb.supabase.co';
const SB_KEY = 'sb_publishable_YXoWLTIJPnUYIWGxB9JGxg_whokIhvi';
const SB_HEADERS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

let cachedLeaderboard = [];
try { cachedLeaderboard = JSON.parse(localStorage.getItem('easter_lb_cache')) || []; } catch {}

}

// ============================================================
// SECTION 6: OBSTACLE SYSTEM
// ============================================================
let obstacles = [];

function getGapSize(score)   { return Math.max(MIN_GAP, INITIAL_GAP - score * GAP_SHRINK); }
function getScrollSpeed(score) { return Math.min(MAX_SCROLL_SPEED, BASE_SCROLL_SPEED + score * SPEED_RAMP); }

function generateObstacle(x, score) {
  const gap = getGapSize(score);
  const minGapY  = GAP_TOP_MIN + gap / 2;
  const maxGapY  = GROUND_Y - GAP_BOTTOM_MIN - gap / 2;
  const gapCenterY = minGapY + Math.random() * (maxGapY - minGapY);
  return {
    x, gapCenterY, gapSize: gap, scored: false,
    variant: Math.floor(Math.random() * 3),
    ledPositions: Array.from({length: 4 + Math.floor(Math.random() * 4)}, () => ({
      y: Math.random(),
      side: Math.random() > 0.5 ? 0 : 1,
      blink: Math.random() * Math.PI * 2,
    })),
  };
}

// White picket fence section
function drawObstacleSection(x, y, w, h, palette, variant, leds, time) {
  if (h <= 0) return;

  // Main fence body (off-white)
  ctx.fillStyle = rgb(palette.obstacle);
  ctx.fillRect(x, y, w, h);

  // Left and right posts (slightly darker, full height)
  ctx.fillStyle = rgb(palette.obstacleDark);
  ctx.fillRect(x,         y, 5, h);
  ctx.fillRect(x + w - 5, y, 5, h);

  // Post highlight
  ctx.fillStyle = rgb(palette.obstacleLight);
  ctx.fillRect(x + 1,     y, 1, h);
  ctx.fillRect(x + w - 4, y, 1, h);

  // Two horizontal rails at ~20% and ~65% of height
  const r1Y = y + Math.max(6,  Math.floor(h * 0.20));
  const r2Y = y + Math.max(18, Math.floor(h * 0.65));
  ctx.fillStyle = rgb(palette.obstacleDark);
  if (r1Y + 5 < y + h) ctx.fillRect(x, r1Y, w, 5);
  if (r2Y + 5 < y + h) ctx.fillRect(x, r2Y, w, 5);
  ctx.fillStyle = rgb(palette.obstacleLight);
  if (r1Y + 5 < y + h) ctx.fillRect(x, r1Y, w, 1);
  if (r2Y + 5 < y + h) ctx.fillRect(x, r2Y, w, 1);

  // Vertical plank divider lines (shadow between planks)
  // Planks are 6px wide, 1px gap = 7px spacing, starting at x+5
  ctx.fillStyle = rgb(palette.obstacleDark);
  for (let px = x + 12; px < x + w - 5; px += 7) {
    ctx.fillRect(px, y, 1, h);
  }

  // Flower dot accents (matching palette LED color, pulsing)
  for (const led of leds) {
    const ly = y + led.y * h;
    if (ly < y + 5 || ly > y + h - 5) continue;
    const lx = led.side === 0 ? x + 7 : x + w - 10;
    const blink = Math.sin(time * 0.05 + led.blink) > 0 ? 1 : 0.4;
    ctx.fillStyle = rgba(palette.obstacleLED, blink);
    ctx.fillRect(lx,     ly + 1, 4, 4);
    ctx.fillRect(lx + 1, ly,     2, 6);
  }
}

function drawObstacles(palette, time) {
  for (const obs of obstacles) {
    const topH    = obs.gapCenterY - obs.gapSize / 2;
    const bottomY = obs.gapCenterY + obs.gapSize / 2;
    const bottomH = GROUND_Y - bottomY;

    // Top fence section
    drawObstacleSection(obs.x, 0, OBSTACLE_WIDTH, topH, palette, obs.variant, obs.ledPositions, time);
    // Downward pointed pickets into the gap
    ctx.fillStyle = rgb(palette.obstacle);
    for (let px = obs.x + 5; px < obs.x + OBSTACLE_WIDTH - 5; px += 7) {
      ctx.fillRect(px,     topH,     6, 4);
      ctx.fillRect(px + 1, topH + 4, 4, 3);
      ctx.fillRect(px + 2, topH + 7, 2, 3);
    }
    ctx.fillStyle = rgb(palette.obstacleLight);
    for (let px = obs.x + 5; px < obs.x + OBSTACLE_WIDTH - 5; px += 7) {
      ctx.fillRect(px, topH, 1, 4);
    }

    // Bottom fence section
    drawObstacleSection(obs.x, bottomY, OBSTACLE_WIDTH, bottomH, palette, obs.variant, obs.ledPositions, time);
    // Upward pointed pickets into the gap
    ctx.fillStyle = rgb(palette.obstacle);
    for (let px = obs.x + 5; px < obs.x + OBSTACLE_WIDTH - 5; px += 7) {
      ctx.fillRect(px,     bottomY - 10, 6, 4);
      ctx.fillRect(px + 1, bottomY - 6,  4, 3);
      ctx.fillRect(px + 2, bottomY - 3,  2, 3);
    }
    ctx.fillStyle = rgb(palette.obstacleLight);
    for (let px = obs.x + 5; px < obs.x + OBSTACLE_WIDTH - 5; px += 7) {
      ctx.fillRect(px, bottomY - 10, 1, 4);
    }
  }
}

// ============================================================
// SECTION 7: BACKGROUND RENDERER
// ============================================================
let bgOffset = 0;

// Pre-built egg color strings — avoids per-frame string allocation
const EGG_COLS   = ['rgb(240,148,178)', 'rgb(128,192,240)', 'rgb(252,224,72)', 'rgb(196,158,224)'];
const EGG_STRIPE = 'rgba(255,255,255,0.65)';

function drawBackground(palette, score) {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, rgb(palette.bg1));
  grd.addColorStop(1, rgb(palette.bg2));
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Scrolling clouds — y position derived from stable slot index, not pixel position
  const cloudSpacing = 150;
  const cloudOff = bgOffset * 0.18;
  ctx.fillStyle = rgba(palette.tunnelLine, 0.8);
  const startSlot = Math.floor(cloudOff / cloudSpacing) - 1;
  for (let slot = startSlot; slot <= startSlot + Math.ceil(W / cloudSpacing) + 2; slot++) {
    const cx = slot * cloudSpacing - cloudOff;
    if (cx > W + 40) break;
    const hash = Math.abs((Math.sin(slot * 127.1 + 311.7) * 43758.5453) % 1);
    const cy = 18 + hash * 32;
    ctx.fillRect(cx,      cy,     26, 10);
    ctx.fillRect(cx + 8,  cy - 7, 20, 9);
    ctx.fillRect(cx + 20, cy,     16, 10);
  }

  // Background flowers — slot-based so they don't flicker
  const t = Math.min(score / 30, 1.0);
  const fsp = t < 0.5 ? 44 : 30;
  const fdy = t < 0.5 ? 52 : 36;
  const flowerStart = Math.floor(bgOffset / fsp) - 1;
  // Pass 1: yellow centers
  ctx.fillStyle = 'rgba(255,215,40,0.85)';
  for (let sx = flowerStart; sx <= flowerStart + Math.ceil(W / fsp) + 2; sx++) {
    const dx = sx * fsp - bgOffset;
    if (dx > W) break;
    for (let dy = 40; dy < GROUND_Y - 15; dy += fdy) {
      const h2 = (Math.sin(sx * 12.345 + dy * 67.89) * 43758.5453) % 1;
      if (Math.abs(h2) < 0.32) ctx.fillRect(dx + 1, dy + 1, 3, 3);
    }
  }
  // Pass 2: petals (spring=pink, summer=yellow)
  ctx.fillStyle = rgba(palette.bgDetail, 0.6);
  for (let sx = flowerStart; sx <= flowerStart + Math.ceil(W / fsp) + 2; sx++) {
    const dx = sx * fsp - bgOffset;
    if (dx > W) break;
    for (let dy = 40; dy < GROUND_Y - 15; dy += fdy) {
      const h2 = (Math.sin(sx * 12.345 + dy * 67.89) * 43758.5453) % 1;
      if (Math.abs(h2) < 0.32) {
        ctx.fillRect(dx - 1, dy + 1, 2, 3);
        ctx.fillRect(dx + 4, dy + 1, 2, 3);
        ctx.fillRect(dx + 1, dy - 1, 3, 2);
        ctx.fillRect(dx + 1, dy + 4, 3, 2);
      }
    }
  }

  // Ground
  ctx.fillStyle = rgb(palette.ground);
  ctx.fillRect(0, GROUND_Y, W, GROUND_HEIGHT);

  // Easter eggs sitting on the lawn — slot-based so they don't jump
  const eggSpacing = 56;
  const eggStart = Math.floor(bgOffset / eggSpacing) - 1;
  for (let slot = eggStart; slot <= eggStart + Math.ceil(W / eggSpacing) + 2; slot++) {
    const ex = slot * eggSpacing - bgOffset;
    if (ex > W + 20) break;
    const hash = Math.abs((Math.sin(slot * 73.156 + 19.3) * 43758.5453) % 1);
    if (hash < 0.62) {
      const ey = GROUND_Y - 10;
      ctx.fillStyle = EGG_COLS[Math.floor(hash * 4)];
      ctx.fillRect(ex + 2, ey,     4, 2);
      ctx.fillRect(ex + 1, ey + 2, 6, 3);
      ctx.fillRect(ex + 1, ey + 5, 6, 2);
      ctx.fillRect(ex + 2, ey + 7, 4, 1);
      ctx.fillStyle = EGG_STRIPE;
      ctx.fillRect(ex + 1, ey + 4, 6, 1);
    }
  }

  // Grass surface
  ctx.fillStyle = rgb(palette.groundDetail);
  for (let gx = -bgOffset % 12; gx < W; gx += 12) {
    ctx.fillRect(gx,     GROUND_Y, 8, 2);
    ctx.fillRect(gx + 3, GROUND_Y + 4, 5, 1);
  }

  // Ground dots
  ctx.fillStyle = rgba(palette.groundDetail, 0.3);
  for (let gx = -bgOffset % 20; gx < W; gx += 20) {
    ctx.fillRect(gx, GROUND_Y + 15, 3, 3);
  }
}

// ============================================================
// SECTION 8: TEXT RENDERING
// ============================================================
function drawText(text, x, y, size, color, align) {
  ctx.save();
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = rgba(color, 0.3);
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = rgb(color);
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawPixelNumber(num, x, y, scale, color) {
  const text = String(num);
  ctx.save();
  ctx.font = `bold ${scale}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(text, x + 2, y + 2);
  ctx.fillStyle = rgb(color);
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ============================================================
// SECTION 9: GAME STATE
// ============================================================
let state = STATE.START;
let score = 0;
let bestScore = parseInt(localStorage.getItem('easter_best_score')) || 0;

let moleY = H / 2;
let moleVY = 0;
let moleRotation = 0;
let moleSquash = 1.0;

let frameCount = 0;
let dyingTimer = 0;
let shakeX = 0;
let shakeY = 0;
let flapCooldown = 0;
let nameInput = '';
let nameCursor = 0;

function resetGame() {
  moleY = H / 2;
  moleVY = 0;
  moleRotation = 0;
  moleSquash = 1.0;
  score = 0;
  obstacles = [];
  frameCount = 0;
  dyingTimer = 0;
  shakeX = 0; shakeY = 0;
  flapCooldown = 0;
  bgOffset = 0;
  for (let i = 0; i < MAX_PARTICLES; i++) particles[i].active = false;
  for (let i = 0; i < 3; i++) {
    obstacles.push(generateObstacle(W + 150 + i * OBSTACLE_SPACING, 0));
  }
}

// ============================================================
// SECTION 10: COLLISION DETECTION
// ============================================================
function checkCollision() {
  const moleHalfW = (BUNNY_W * MOLE_SIZE) / 2 - HITBOX_INSET;
  const moleHalfH = (BUNNY_H * MOLE_SIZE) / 2 - HITBOX_INSET;

  const mLeft   = MOLE_X - moleHalfW;
  const mRight  = MOLE_X + moleHalfW;
  const mTop    = moleY  - moleHalfH;
  const mBottom = moleY  + moleHalfH;

  if (mBottom >= GROUND_Y) return true;
  if (mTop <= 0) return true;

  for (const obs of obstacles) {
    if (mRight > obs.x && mLeft < obs.x + OBSTACLE_WIDTH) {
      const gapTop    = obs.gapCenterY - obs.gapSize / 2;
      const gapBottom = obs.gapCenterY + obs.gapSize / 2;
      if (mTop < gapTop || mBottom > gapBottom) return true;
    }
  }
  return false;
}

// ============================================================
// SECTION 11: INPUT HANDLING
// ============================================================
let inputPressed = false;
function onInput() { inputPressed = true; }

const nameInputEl = document.getElementById('name-input');

// Sync typed characters from the native input element → nameInput
nameInputEl.addEventListener('input', () => {
  nameInput = nameInputEl.value.toUpperCase().slice(0, 10);
  nameInputEl.value = nameInput;
});
nameInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (nameInput.includes('96')) {
      alert('Liebe Bittners, das ist in diesem Spiel eine verbotene Zahl :-)');
      return;
    }
    submitScore(nameInput, score);
    nameInput = '';
    nameInputEl.value = '';
    nameInputEl.blur();
    state = STATE.GAME_OVER;
  }
});

document.addEventListener('keydown', (e) => {
  if (state === STATE.NAME_ENTRY) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (nameInput.includes('96')) {
        alert('Liebe Bittners, das ist in diesem Spiel eine verbotene Zahl :-)');
        return;
      }
      submitScore(nameInput, score);
      nameInput = '';
      nameInputEl.value = '';
      nameInputEl.blur();
      state = STATE.GAME_OVER;
    }
    // All other keys handled natively by nameInputEl
    return;
  }
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onInput(); }
});
canvas.addEventListener('mousedown', (e) => { e.preventDefault(); onInput(); });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state === STATE.NAME_ENTRY) { nameInputEl.focus(); return; }
  onInput();
}, { passive: false });

function handleInput() {
  if (!inputPressed) return;
  inputPressed = false;

  if (state === STATE.NAME_ENTRY) {
    return; // handled by nameInputEl + keydown
  }
  if (state === STATE.START) {
    resetGame();
    state = STATE.PLAYING;
    return;
  }
  if (state === STATE.PLAYING && flapCooldown <= 0) {
    moleVY = FLAP_IMPULSE;
    moleSquash = 0.75;
    flapCooldown = 5;
    spawnFlapParticles(MOLE_X, moleY, getPalette(score));
    return;
  }
  if (state === STATE.GAME_OVER) {
    state = STATE.START;
    return;
  }
}

// ============================================================
// SECTION 12: UPDATE LOGIC
// ============================================================
function update() {
  frameCount++;
  handleInput();

  if (state === STATE.START) {
    moleY = H / 2 + Math.sin(frameCount * 0.03) * 15;
    moleRotation = Math.sin(frameCount * 0.02) * 0.05;
    updateParticles();
    return;
  }

  if (state === STATE.PLAYING) {
    moleVY += GRAVITY;
    if (moleVY > TERMINAL_VELOCITY) moleVY = TERMINAL_VELOCITY;
    moleY += moleVY;

    const targetRotation = Math.max(-0.5, Math.min(0.8, moleVY * 0.08));
    moleRotation += (targetRotation - moleRotation) * 0.15;
    moleSquash += (1.0 - moleSquash) * 0.15;
    if (flapCooldown > 0) flapCooldown--;

    const speed = getScrollSpeed(score);
    bgOffset += speed;

    for (const obs of obstacles) {
      obs.x -= speed;
      if (!obs.scored && obs.x + OBSTACLE_WIDTH < MOLE_X) {
        obs.scored = true;
        score++;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('easter_best_score', bestScore);
        }
        if (score % 10 === 0) spawnFirework(MOLE_X, moleY);
      }
    }

    while (obstacles.length > 0 && obstacles[0].x + OBSTACLE_WIDTH < -10) {
      obstacles.shift();
    }

    const lastObs = obstacles[obstacles.length - 1];
    if (!lastObs || lastObs.x < W - OBSTACLE_SPACING + OBSTACLE_WIDTH) {
      obstacles.push(generateObstacle(lastObs ? lastObs.x + OBSTACLE_SPACING : W + 50, score));
    }

    if (checkCollision()) {
      state = STATE.DYING;
      dyingTimer = DYING_FRAMES;
      spawnDeathParticles(MOLE_X, moleY, getPalette(score));
      shakeX = 6; shakeY = 6;
    }

    updateParticles();
    return;
  }

  if (state === STATE.DYING) {
    moleVY += GRAVITY * 0.5;
    moleY  += moleVY * 0.3;
    moleRotation += 0.15;
    shakeX *= 0.85; shakeY *= 0.85;
    if (--dyingTimer <= 0) {
      shakeX = 0; shakeY = 0;
      if (score > 0 && qualifiesForLeaderboard(score)) {
        nameInput = '';
        nameInputEl.value = '';
        state = STATE.NAME_ENTRY;
        nameInputEl.focus();
      } else {
        state = STATE.GAME_OVER;
      }
    }
    updateParticles();
    return;
  }

  if (state === STATE.NAME_ENTRY) {
    nameCursor++;
    updateParticles();
    return;
  }

  if (state === STATE.GAME_OVER) {
    updateParticles();
    return;
  }
}

// ============================================================
// SECTION 13: RENDER
// ============================================================
function render() {
  const palette = getPalette(score);

  ctx.save();
  if (state === STATE.DYING) {
    ctx.translate((Math.random() - 0.5) * shakeX, (Math.random() - 0.5) * shakeY);
  }

  drawBackground(palette, score);
  drawObstacles(palette, frameCount);
  drawParticles();

  if (state !== STATE.GAME_OVER) {
    drawBunny(MOLE_X, moleY, moleRotation, moleSquash);
  }

  ctx.restore();

  if (state === STATE.PLAYING) {
    drawPixelNumber(score, W / 2, 45, 36, palette.text);
  }

  // Start screen
  if (state === STATE.START) {
    ctx.fillStyle = 'rgba(220, 245, 255, 0.35)';
    ctx.fillRect(0, 0, W, H);

    drawText('EASTER HOP', W / 2, 145, 36, [60, 40, 15]);

    const sub = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
    ctx.save();
    ctx.globalAlpha = sub;
    drawText('Tap or Press Space', W / 2, H - 140, 16, [80, 55, 20]);
    ctx.restore();

    if (bestScore > 0) {
      drawText('Best: ' + bestScore, W / 2, H - 100, 14, [100, 65, 20]);
    }
  }

  // Name entry
  if (state === STATE.NAME_ENTRY) {
    ctx.fillStyle = 'rgba(20, 10, 40, 0.75)';
    ctx.fillRect(0, 0, W, H);

    drawText('NEW HIGH SCORE!', W / 2, 130, 28, [255, 220, 60]);
    drawPixelNumber(score, W / 2, 185, 48, [255, 255, 255]);

    drawText('ENTER YOUR NAME', W / 2, 260, 15, [200, 180, 255]);

    // Name input box
    const boxW = 220, boxH = 44;
    const boxX = (W - boxW) / 2;
    const boxY = 280;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeStyle = 'rgba(255,220,60,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxW, boxH);

    const cursor = nameCursor % 60 < 30 ? '_' : ' ';
    ctx.save();
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText((nameInput + cursor).toUpperCase(), W / 2, boxY + boxH / 2);
    ctx.restore();

    drawText('ENTER to confirm', W / 2, 355, 13, [160, 150, 200]);
  }

  // Game over
  if (state === STATE.GAME_OVER) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, W, H);

    drawText('THE BUNNY FLOPPED', W / 2, 130, 24, palette.text);
    drawText('Back in the basket.', W / 2, 165, 13, palette.textGlow);

    drawText('Score', W / 2, 210, 14, palette.textGlow);
    drawPixelNumber(score, W / 2, 248, 42, palette.text);

    // Leaderboard
    const lb = loadLeaderboard();
    if (lb.length > 0) {
      drawText('TOP SCORES', W / 2, 300, 13, [255, 220, 60]);
      const medals = ['#FFD700', '#C0C0C0', '#CD7F32'];
      lb.forEach((entry, i) => {
        const ey = 325 + i * 34;
        ctx.save();
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = medals[i] || '#aaa';
        ctx.fillText(`${i + 1}. ${entry.name.toUpperCase()}`, W / 2 - 20, ey);
        ctx.textAlign = 'right';
        ctx.fillText(String(entry.score), W / 2 + 80, ey);
        ctx.restore();
      });
    }

    const ra = 0.5 + Math.sin(frameCount * 0.05) * 0.3;
    ctx.save();
    ctx.globalAlpha = ra;
    drawText('Tap or Press Space', W / 2, H - 60, 16, palette.text);
    ctx.restore();
  }

  // Death flash
  if (state === STATE.DYING && dyingTimer > DYING_FRAMES - 5) {
    ctx.fillStyle = `rgba(255,255,255,${(dyingTimer - (DYING_FRAMES - 5)) / 5 * 0.4})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ============================================================
// SECTION 14: GAME LOOP
// ============================================================
const FIXED_DT = 1000 / 60;
let lastTime   = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  if (delta > 200) delta = 200;
  accumulator += delta;
  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// SECTION 15: INITIALIZATION
// ============================================================
moleY = H / 2;
fetchLeaderboard();
requestAnimationFrame(gameLoop);
</script>
